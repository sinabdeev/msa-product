spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never

  jdbc:
    initialize-schema: never

  jackson:
    serialization:
      write-dates-as-timestamps: false

# Disable SpringDoc for tests
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Disable actuator for tests
management:
  endpoints:
    web:
      exposure:
        include: ""

logging:
  level:
    org.springframework.jdbc: WARN
    ru.example.product.receiver: DEBUG