databaseChangeLog:
  - changeSet:
      id: 001-create-products-table
      author: system
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sku
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(19, 4)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: weight
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: true
              - column:
                  name: is_available
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: tags
                  type: JSONB
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_products_sku
            tableName: products
            columns:
              - column:
                  name: sku
                  descending: false
        - createIndex:
            indexName: idx_products_category
            tableName: products
            columns:
              - column:
                  name: category
                  descending: false
        - createIndex:
            indexName: idx_products_is_available
            tableName: products
            columns:
              - column:
                  name: is_available
                  descending: false